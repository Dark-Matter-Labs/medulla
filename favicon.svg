<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#111111"/>
  <!-- Connection lines -->
  <line x1="16" y1="6" x2="6"  y2="25" stroke="#666" stroke-width="1.2"/>
  <line x1="16" y1="6" x2="26" y2="25" stroke="#666" stroke-width="1.2"/>
  <line x1="6"  y1="25" x2="26" y2="25" stroke="#666" stroke-width="1.2"/>
  <line x1="16" y1="6"  x2="16" y2="19" stroke="#666" stroke-width="1.2"/>
  <line x1="6"  y1="25" x2="16" y2="19" stroke="#666" stroke-width="1.2"/>
  <line x1="26" y1="25" x2="16" y2="19" stroke="#666" stroke-width="1.2"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="6"  r="2.5" fill="#F5F3EE"/>
  <circle cx="6"  cy="25" r="2.5" fill="#F5F3EE"/>
  <circle cx="26" cy="25" r="2.5" fill="#F5F3EE"/>
  <!-- Centre hub — accent red -->
  <circle cx="16" cy="19" r="3.2" fill="#CC2200"/>
</svg>
